repos:
  - repo: local
    hooks:
      - id: run-kline-tests
        name: Run K-line tests
        entry: python3 tests/test_kline_all_markets.py
        language: system
        types: [python]
        pass_filenames: false
        always_run: true
        verbose: true

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-ast
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
